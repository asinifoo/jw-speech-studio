<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JW Speech Studio · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* This kit is a faithful mobile-first recreation. Wider viewports get the column. */
  body { margin: 0; }
  #root { opacity: 0; transition: opacity 0.15s; }
  #root.ready { opacity: 1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="Tabs.jsx"></script>
<script type="text/babel" src="SearchCard.jsx"></script>
<script type="text/babel" src="screens/SearchScreen.jsx"></script>
<script type="text/babel" src="screens/PrepareScreen.jsx"></script>
<script type="text/babel" src="screens/ManageScreen.jsx"></script>
<script type="text/babel" src="screens/InputScreen.jsx"></script>
<script type="text/babel" src="screens/PreprocessScreen.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel">
  // mount
  const root = document.getElementById('root');
  ReactDOM.createRoot(root).render(<JW_AppShell />);
  requestAnimationFrame(() => root.classList.add('ready'));
</script>
</body>
</html>
