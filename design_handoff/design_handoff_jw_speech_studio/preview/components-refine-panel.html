<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:16px;background:var(--bg);font-family:var(--font-sans);color:var(--c-text);display:flex;flex-direction:column;gap:14px}
/* refine panel */
.rp{background:var(--bg-card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;max-width:500px}
.rp-hd{padding:8px 12px;background:var(--bg-subtle);border-bottom:1px solid var(--bd-light);display:flex;align-items:center;gap:8px;font-size:0.786rem;font-weight:600;color:var(--c-hint)}
.rp-bd{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
/* pills */
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 10px;border-radius:20px;font-size:0.786rem;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px}
.pill-on{border:1px solid #1D9E75;background:var(--tint-green);color:#1D9E75;font-weight:600}
.pill-off{border:1px solid var(--bd);background:var(--bg-card);color:var(--c-faint);font-weight:400}
.pill-add{border:1px dashed var(--bd-medium);background:var(--bg-card);color:var(--c-dim)}
textarea.rp-ta{background:var(--bg-subtle);border:1px solid var(--bd-light);border-radius:8px;padding:8px 10px;font-size:0.857rem;font-family:inherit;color:var(--c-text);resize:vertical;min-height:60px;outline:none;line-height:1.7;width:100%;box-sizing:border-box}
/* progress */
.prog{height:4px;background:var(--bg-muted);border-radius:2px;overflow:hidden}
.prog div{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
.rp-foot{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd-light);align-items:center}
.rp-btn{padding:6px 14px;border-radius:8px;font-size:0.857rem;font-weight:600;font-family:inherit;cursor:pointer;border:none}
.rp-status{font-size:0.786rem;color:var(--c-muted)}
</style></head><body>

<div class="rp">
  <div class="rp-hd">다듬기 (RefinePanel)</div>
  <div class="rp-bd">
    <div>
      <div style="font-size:0.75rem;color:#8E8E93;font-weight:600;margin-bottom:4px">프리셋 지시사항</div>
      <div class="pills">
        <button class="pill pill-on">✓ 자연스러운 대화체로</button>
        <button class="pill pill-off">○ 성구를 더 강조</button>
        <button class="pill pill-off">○ 예시 추가</button>
        <button class="pill pill-add">+</button>
      </div>
    </div>
    <div>
      <div style="font-size:0.75rem;color:#8E8E93;font-weight:600;margin-bottom:4px">추가 지시</div>
      <textarea class="rp-ta" placeholder="다듬기 지시사항을 입력하세요…">청중이 공감할 수 있도록 일상적인 예시를 포함해 주세요</textarea>
    </div>
    <div class="prog"><div style="width:65%"></div></div>
  </div>
  <div class="rp-foot">
    <button class="rp-btn" style="background:#1D9E75;color:#fff">다듬기</button>
    <button class="rp-btn" style="background:var(--bg-subtle);color:var(--c-muted)">중단</button>
    <span class="rp-status">다듬기 중… 65%</span>
  </div>
</div>

</body></html>
